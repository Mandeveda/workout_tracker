{% extends "base.html" %}
{% block title %}Свободная тренировка{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">➕ Свободная тренировка</h2>
    <p class="text-muted">Добавьте упражнения, которые выполнили сегодня. Вес и повторения — по желанию.</p>
    
    <form method="POST" id="workoutForm">
        <div id="exercisesContainer">
            <div class="card mb-3 exercise-card">
                <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                    <strong>Упражнение 1</strong>
                    <button type="button" class="btn btn-sm btn-danger remove-exercise">✖ Удалить</button>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-5 mb-2">
                            <label class="form-label">Упражнение</label>
                            <select name="exercise_id" class="form-select exercise-select" required>
                                <option value="">-- Выберите упражнение --</option>
                                {% for exercise in exercises %}
                                    <option value="{{ exercise.id }}">{{ exercise.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-2 mb-2">
                            <label class="form-label">Подход</label>
                            <input type="number" name="set_number" class="form-control" value="1" min="1">
                        </div>
                        <div class="col-md-2 mb-2">
                            <label class="form-label">Вес (кг)</label>
                            <input type="number" step="0.5" name="weight" class="form-control" placeholder="50" required>
                        </div>
                        <div class="col-md-3 mb-2">
                            <label class="form-label">Повторения</label>
                            <input type="number" name="reps" class="form-control" placeholder="10" required>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mb-3">
            <button type="button" id="addExerciseBtn" class="btn btn-outline-primary">+ Добавить упражнение</button>
        </div>
        
        <div class="text-center">
            <button type="submit" class="btn btn-success btn-lg">Сохранить тренировку</button>
            <a href="{{ url_for('workouts.index') }}" class="btn btn-secondary btn-lg">Отмена</a>
        </div>
    </form>
</div>

<script>
    let exerciseCount = 1;
    
    document.getElementById('addExerciseBtn').addEventListener('click', function() {
        exerciseCount++;
        
        const container = document.getElementById('exercisesContainer');
        const newCard = document.createElement('div');
        newCard.className = 'card mb-3 exercise-card';
        newCard.innerHTML = `
            <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                <strong>Упражнение ${exerciseCount}</strong>
                <button type="button" class="btn btn-sm btn-danger remove-exercise">✖ Удалить</button>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-5 mb-2">
                        <label class="form-label">Упражнение</label>
                        <select name="exercise_id" class="form-select exercise-select" required>
                            <option value="">-- Выберите упражнение --</option>
                            {% for exercise in exercises %}
                                <option value="{{ exercise.id }}">{{ exercise.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2 mb-2">
                        <label class="form-label">Подход</label>
                        <input type="number" name="set_number" class="form-control" value="1" min="1">
                    </div>
                    <div class="col-md-2 mb-2">
                        <label class="form-label">Вес (кг)</label>
                        <input type="number" step="0.5" name="weight" class="form-control" placeholder="50" required>
                    </div>
                    <div class="col-md-3 mb-2">
                        <label class="form-label">Повторения</label>
                        <input type="number" name="reps" class="form-control" placeholder="10" required>
                    </div>
                </div>
            </div>
        `;
        
        container.appendChild(newCard);
        
        // Добавляем обработчик удаления для новой карточки
        newCard.querySelector('.remove-exercise').addEventListener('click', function() {
            newCard.remove();
            // Перенумеровываем заголовки
            document.querySelectorAll('.exercise-card').forEach((card, idx) => {
                card.querySelector('.card-header strong').textContent = `Упражнение ${idx + 1}`;
            });
        });
    });
    
    // Добавляем обработчики удаления для существующих карточек
    document.querySelectorAll('.remove-exercise').forEach(btn => {
        btn.addEventListener('click', function() {
            const card = this.closest('.exercise-card');
            card.remove();
            // Перенумеровываем заголовки
            document.querySelectorAll('.exercise-card').forEach((card, idx) => {
                card.querySelector('.card-header strong').textContent = `Упражнение ${idx + 1}`;
            });
        });
    });
</script>
{% endblock %}
